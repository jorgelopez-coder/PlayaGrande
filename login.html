<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso · Kioskos Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#faf7f0; --card:#fff; --border:#c8ddd0; --text:#1c3a28;
      --muted:#5a8a6a; --subtle:#a0c8b0; --green:#1a7a4a;
      --green-bg:#eef8f2; --red:#c84a20; --red-bg:#fdf0eb;
      --font-d:'Inter Tight',sans-serif; --font-b:'Inter',sans-serif;
    }
    body {
      background:var(--bg); color:var(--text); font-family:var(--font-b);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:2rem;
    }
    .card {
      background:var(--card); border:1px solid var(--border); border-radius:16px;
      padding:2.5rem; width:100%; max-width:380px;
    }
    .logo { display:flex; align-items:center; gap:10px; margin-bottom:2rem; }
    .logo-mark {
      width:40px; height:40px; border-radius:10px; background:var(--text);
      display:flex; align-items:center; justify-content:center;
    }
    .logo-mark svg { width:22px; height:22px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .logo-name { font-family:var(--font-d); font-size:17px; font-weight:700; }
    .logo-sub  { font-size:12px; color:var(--muted); }
    h1 { font-family:var(--font-d); font-size:22px; font-weight:700; margin-bottom:6px; }
    p  { font-size:13px; color:var(--muted); margin-bottom:2rem; }
    label { font-size:13px; font-weight:500; color:var(--text); display:block; margin-bottom:6px; }
    .pin-wrap { position:relative; margin-bottom:1.25rem; }
    input[type="password"] {
      width:100%; background:var(--bg); border:1.5px solid var(--border);
      border-radius:10px; color:var(--text); font-family:var(--font-b);
      font-size:20px; letter-spacing:.3em; padding:12px 40px 12px 16px;
      outline:none; transition:border-color .15s;
    }
    input[type="password"]:focus { border-color:var(--green); }
    .toggle-vis {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:var(--subtle);
      font-size:12px; padding:4px;
    }
    .btn {
      width:100%; background:var(--text); color:#fff; border:none;
      border-radius:10px; font-family:var(--font-d); font-size:15px;
      font-weight:700; padding:13px; cursor:pointer; transition:opacity .15s;
    }
    .btn:hover { opacity:.88; }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .error {
      font-size:12px; color:var(--red); background:var(--red-bg);
      border:1px solid #f0c0a8; border-radius:8px; padding:9px 12px;
      margin-top:12px; display:none; text-align:center;
    }
    .footer { text-align:center; margin-top:1.5rem; font-size:11px; color:var(--subtle); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M3 22h18M5 22V9a1 1 0 011-1h12a1 1 0 011 1v13M8 8V4h8v4M12 12v6"/></svg>
    </div>
    <div>
      <div class="logo-name">Playa Grande Brew House</div>
      <div class="logo-sub">Ecosistema Kioskos</div>
    </div>
  </div>

  <h1>Bienvenido</h1>
  <p>Ingresá tu código de acceso para continuar.</p>

  <label for="pin">Código de acceso</label>
  <div class="pin-wrap">
    <input type="password" id="pin" maxlength="10" placeholder="••••" autocomplete="off"
      onkeydown="if(event.key==='Enter')ingresar()">
    <button class="toggle-vis" onclick="toggleVis()" type="button" title="Mostrar código">👁</button>
  </div>

  <button class="btn" id="btn-ingresar" onclick="ingresar()">Ingresar</button>
  <div class="error" id="error-msg">Código incorrecto. Intentá nuevamente.</div>

  <div class="footer">Playa Grande Brew House · Portal interno de kioskos</div>
</div>

<script>
// Misma URL /exec del backend de RRHH que usan cierres.html, configuracion.html
// y admin-accesos.html — ahí vive la pestaña "Roles" (nombre, PIN, color,
// módulos y kioskos permitidos por rol).
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwF97oX3BogjtjGjd5ZL9OfWsdU7MDGc12CuD-TGTQUdRe6I9OR6oamsiWJD_T-xNjaWQ/exec';

// Rol de respaldo — se usa si todavía no se desplegó el backend con la
// pestaña "Roles" (ver admin-accesos.html), o si por algún motivo no hay
// conexión: sin esto, un problema de red dejaría a todo el mundo afuera del
// portal. En cuanto haya conexión, ROLES se reemplaza por lo que devuelva el
// backend (incluye siempre un rol "admin"/"admin" sembrado automáticamente
// la primera vez que se corre configurarHojas()).
const ADMIN_DEFAULT = { id:'admin', nombre:'Administrador', pin:'admin', color:'#1a7a4a', modulos:'todos', kioskos:'todos' };

let ROLES = null; // null = todavía cargando

// Convierte "todos" | "a,b,c" (tal cual viene del Sheet) a 'todos' | ['a','b','c'].
function parseLista(v) {
  const s = String(v == null ? 'todos' : v).trim();
  if (!s || s.toLowerCase() === 'todos') return 'todos';
  return s.split(',').map(x => x.trim()).filter(Boolean);
}

async function cargarRoles() {
  try {
    const resp = await fetch(APPS_SCRIPT_URL + '?modulo=roles');
    const data = await resp.json();
    const registros = (data.ok && Array.isArray(data.registros)) ? data.registros : [];
    const activos = registros.filter(r => String(r['Activo']||'Sí').trim().toLowerCase() !== 'no');
    ROLES = activos.length ? activos.map(r => ({
      id: r['ID'], nombre: r['Nombre'], pin: String(r['PIN']||'').trim(),
      color: r['Color'] || '#1a7a4a',
      modulos: parseLista(r['Modulos']), kioskos: parseLista(r['Kioskos'])
    })) : [ADMIN_DEFAULT];
    // Cache local por si la próxima carga no tiene conexión.
    localStorage.setItem('portal_roles_cache', JSON.stringify(ROLES));
  } catch (e) {
    try { ROLES = JSON.parse(localStorage.getItem('portal_roles_cache')||'null') || [ADMIN_DEFAULT]; }
    catch { ROLES = [ADMIN_DEFAULT]; }
  }
  document.getElementById('pin').disabled = false;
  document.getElementById('btn-ingresar').disabled = false;
}

function toggleVis() {
  const inp = document.getElementById('pin');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function ingresar() {
  const pin = document.getElementById('pin').value.trim();
  if (!pin || !ROLES) return;
  const rol = ROLES.find(r => r.pin === pin);
  if (!rol) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('pin').value = '';
    document.getElementById('pin').focus();
    return;
  }
  localStorage.setItem('portal_sesion', JSON.stringify({
    rol_id:   rol.id,
    nombre:   rol.nombre,
    modulos:  rol.modulos,
    kioskos:  rol.kioskos,
    ts:       Date.now()
  }));
  window.location.href = 'index.html';
}

const sesion = JSON.parse(localStorage.getItem('portal_sesion')||'null');
if (sesion && (Date.now() - sesion.ts) < 8 * 60 * 60 * 1000) {
  window.location.href = 'index.html';
}

document.getElementById('pin').disabled = true;
document.getElementById('btn-ingresar').disabled = true;
cargarRoles();
document.getElementById('pin').focus();
</script>
</body>
</html>
